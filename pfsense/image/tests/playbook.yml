---
- name: pfSense Firewall Rule Test
  hosts: localhost
  gather_facts: false
  collections:
    - pfsensible.core
  tasks:
    - name: Create a test firewall rule
      pfsensible.core.pfsense_rule:
        name: "test rule from ansible"
        action: pass
        interface: lan
        protocol: any
        source: any
        destination: any
        state: present
      vars:
        ansible_host: "{{ pfsense_host }}"
        ansible_user: "{{ pfsense_user }}"
        ansible_password: "{{ pfsense_password }}"
        ansible_python_interpreter: /usr/local/bin/python3
      register: rule_result
    - name: Show rule creation result
      debug:
        var: rule_result
