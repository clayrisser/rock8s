# Agent OS Standards Index

build:
  editor-style:
    description: EditorConfig indentation and style rules per file type
  man-pages:
    description: Auto-generating roff man pages from _help() heredocs via manpages.sh

global:
  architecture:
    description: Repository layout, stack overview (k3s via k3sup, OpenTofu, MetalLB)

providers:
  addon-registry:
    description: Snake_case addon IDs, config shape, default set, and GitLab heuristics
  execution-model:
    description: Provider code copy, tfvars.sh/variables.sh flow, OpenTofu migration
  purpose-based-infra:
    description: master/worker purpose dirs with per-purpose state and init heuristics

shell:
  config-state-layout:
    description: XDG paths, cluster hierarchy, config discovery
  interactive-prompts:
    description: Config-first design, ref+ secret resolution, fail-fast behavior
  output-error-handling:
    description: fail/error/warn/log/debug primitives, JSON/YAML/text format_output
  posix-compliance:
    description: Strict POSIX /bin/sh compliance, no bashisms, set -e
  subcommand-dispatch:
    description: CLI dispatch chain via exec sh, _help() format, option parsing
  variable-naming:
    description: ROCK8S_* globals, _ prefix locals, boolean 0/1 strings, parameter defaults
