provider:
  type: libvirt
  uri: qemu:///system

network:
  entrypoint: cluster.example.com
  lan:
    name: lan.example.com
    ipv4:
      subnet: 10.0.1.0/24

masters:
  - type: small

workers:
  - type: small
    count: 2

addons:
  email: email@example.com
  argocd: {}
  ceph: {}
  cluster_issuer: {}
  external_dns:
    powerdns:
      api_url: https://example.com
      api_key: ref+env://PDNS_API_KEY
  flux: {}
  kanister: {}
  kyverno: {}
  longhorn: {}
  olm: {}
  openebs: {}
  rancher:
    admin_password: ref+env://RANCHER_PASSWORD
  rancher_istio: {}
  rancher_logging: {}
  rancher_monitoring: {}
  reloader: {}
  tempo: {}
  vault: {}
